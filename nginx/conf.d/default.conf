upstream backend {
    server web:8000;
}

upstream notify_server {
    server notify-server:8002;
}

server {
    listen 80;
    server_name axphone.it www.axphone.it;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name axphone.it www.axphone.it;
    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/axphone.it-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/axphone.it-0001/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /callkit_logo.png {
        alias /usr/share/nginx/html/callkit_logo.png;
        expires 30d;
    }

    location /admin-panel/ {
        alias /opt/axphone/admin-panel/build/;
        try_files $uri $uri/ /admin-panel/index.html;
    }

    location /notify/ws/ {
        proxy_pass http://notify_server/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /notify/poll/ {
        proxy_pass http://notify_server/poll/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location /notify/register {
        proxy_pass http://notify_server/register;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location /notify/unregister {
        proxy_pass http://notify_server/unregister;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location /notify/voip-token {
        proxy_pass http://notify_server/voip-token;
    }

    location /notify/badge-sync {
        proxy_pass http://notify_server/badge-sync;
        proxy_set_header Host $host;
        proxy_read_timeout 15s;
    }

    location /notify/health {
        proxy_pass http://notify_server/health;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
