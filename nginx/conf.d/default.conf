upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name axphone.it www.axphone.it;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name axphone.it www.axphone.it;

    ssl_certificate /etc/letsencrypt/live/axphone.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/axphone.it/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location /admin-panel {
        alias /app/admin-panel;
        try_files $uri $uri/ /admin-panel/index.html;
        index index.html;
    }

    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
