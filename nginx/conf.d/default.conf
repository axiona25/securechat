upstream backend {
    server web:8000;
}

upstream notify_server {
    server notify-server:8002;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # ── WebSocket notify (real-time notifiche) ──
    # DEVE stare prima della location /ws/ del backend
    location /notify/ws/ {
        proxy_pass http://notify_server/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60s;
    }

    # ── Polling fallback notifiche ──
    location /notify/poll/ {
        proxy_pass http://notify_server/poll/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Registrazione dispositivo ──
    location /notify/register {
        proxy_pass http://notify_server/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Unregister dispositivo ──
    location /notify/unregister {
        proxy_pass http://notify_server/unregister;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Badge sync ──
    location /notify/badge-sync {
        proxy_pass http://notify_server/badge-sync;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    # ── Typing indicators ──
    location /notify/typing/ {
        rewrite ^/notify/(.*)$ /$1 break;
        proxy_pass http://notify_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # ── Health check notify ──
    location /notify/health {
        proxy_pass http://notify_server/health;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # ── WebSocket Django (chiamate WebRTC, chat real-time) ──
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ── Media files ──
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend Django (tutto il resto) ──
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
