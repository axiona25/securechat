services:
  web:
    build: ./backend
    container_name: securechat_web
    command: sh -c "python manage.py reset_online_status && exec daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:8.0
    container_name: securechat_db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-securechat}
      MYSQL_USER: ${DB_USER:-securechat}
      MYSQL_PASSWORD: ${DB_PASSWORD:-securechat}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PostgreSQL dedicato al notify server ---
  notify_db:
    image: postgres:15-alpine
    container_name: securechat_notify_db
    environment:
      POSTGRES_DB: securechat_notify
      POSTGRES_USER: notify_user
      POSTGRES_PASSWORD: ${NOTIFY_DB_PASSWORD:-notify_pass_2026}
    volumes:
      - notify_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify_user -d securechat_notify"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    container_name: securechat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: securechat_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - static_data:/app/staticfiles
      - media_data:/app/media
      - ./admin-panel/build:/opt/axphone/admin-panel/build:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - notify-server
    restart: unless-stopped

  # --- SecureChat Notify Server ---
  notify-server:
    build:
      context: ./securechatnotify
      dockerfile: Dockerfile.notify
    container_name: securechat_notify
    restart: unless-stopped
    environment:
      # PostgreSQL dedicato notify
      DATABASE_URL: postgresql://notify_user:${NOTIFY_DB_PASSWORD:-notify_pass_2026}@notify_db:5432/securechat_notify

      # APNs — iOS
      APNS_AUTH_KEY_PATH: /app/secrets/AuthKey_5GK4YZ6U3D.p8
      APNS_KEY_ID: 5GK4YZ6U3D
      APNS_TEAM_ID: F28CW3467A
      APNS_TOPIC: com.axphone.app
      APNS_USE_SANDBOX: "false"
      VOIP_USE_SANDBOX: "false"

      # FCM — Android
      FCM_CREDENTIALS_PATH: /app/secrets/firebase-service-account.json

      # Sicurezza inter-servizi
      NOTIFY_SERVICE_KEY: ${NOTIFY_SERVICE_KEY}

      # Backend Django
      BACKEND_BASE_URL: http://web:8000/api

      # Ambiente
      ENVIRONMENT: production
      DEBUG: "false"
      NOTIFY_DEBUG: "false"

    volumes:
      # Monta la cartella securechatnotify come secrets (read-only)
      - ./securechatnotify:/app/secrets:ro

    networks:
      - default

    depends_on:
      notify_db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_worker:
    build: ./backend
    container_name: securechat_celery_worker
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build: ./backend
    container_name: securechat_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  media_data:
  static_data:
  notify_pg_data:      # PostgreSQL dedicato al notify server

networks:
  default:
    name: securechat_network
